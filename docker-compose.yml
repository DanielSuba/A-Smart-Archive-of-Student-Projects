services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archiwum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d archiwum"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: smart-archive-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archiwum
      AI_DOC_EVALUATOR_URL: http://host.docker.internal:1234/v1/chat/completions
      AI_DOC_EVALUATOR_MODEL: local-model
      AI_PORTFOLIO_GENERATOR_URL: http://host.docker.internal:1234/v1/chat/completions
      AI_PORTFOLIO_GENERATOR_MODEL: local-model
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend-src
    container_name: smart-archive-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
